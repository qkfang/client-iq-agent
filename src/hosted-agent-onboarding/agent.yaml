# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: hosted-onboarding-agent
description: |
    A hosted customer onboarding agent that extracts an onboarding form,
    enriches it with Work IQ, checks it against the Foundry IQ knowledge base,
    summarises the customer with Bing and Fabric IQ, and finalises the CRM
    record. Built with the Agent Framework SDK.
metadata:
    tags:
        - AI Agent Hosting
        - Agent Framework
        - Foundry IQ
        - Python
protocols:
    - protocol: responses
      version: 2.0.0
resources:
    cpu: '0.5'
    memory: 1.0Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.6-sol
