# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: hosted-chat-agent
description: |
    A hosted operations assistant grounded with the Foundry IQ knowledge base
    built by this solution accelerator. Built with the Agent Framework SDK.
metadata:
    tags:
        - AI Agent Hosting
        - Agent Framework
        - Foundry IQ
        - Python
protocols:
    - protocol: responses
      version: 2.0.0
resources:
    cpu: '0.5'
    memory: 1.0Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.6-sol
