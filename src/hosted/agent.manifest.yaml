# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: hosted-chat-agent
displayName: "HostedChatAgent"
description: >
  A hosted operations assistant grounded with the Foundry IQ knowledge base
  built by this solution accelerator (delivery operations, inventory
  logistics, supplier relationships).
metadata:
  tags:
    - AI Agent Hosting
    - Agent Framework
    - Foundry IQ
    - Python
template:
  name: hosted-chat-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: FOUNDRY_MODEL
      value: "{{FOUNDRY_MODEL}}"
resources:
  - kind: model
    id: gpt-5-mini
    name: FOUNDRY_MODEL
  # Foundry IQ knowledge base built by infra/scripts/foundry/step_knowledge_base.py.
  # The `id` must match the knowledge base name, which defaults to
  # "<SOLUTION_SUFFIX>-kb" (see infra/scripts/install_microsoft_iq_solution.py).
  - kind: knowledge
    id: "<SOLUTION_SUFFIX>-kb"
