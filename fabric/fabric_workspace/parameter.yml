# ============================================================================
# parameter.yml — fabric-cicd parameterization for fabric/fabric_workspace
# ============================================================================
# Handles environment-specific value replacement when deploying to target
# environments via the fabric-cicd library.
# See: https://microsoft.github.io/fabric-cicd/0.1.12/how_to/parameterization/
#
# find_replace: replaces every instance of find_value in every file matching
# the optional item_type / item_name / file_path filters.
# .platform files are excluded automatically by fabric-cicd.
#
# Current GUIDs (source/DEV workspace — main_pipeline.Notebook):
#   Lakehouse : 3da39fae-d464-ba66-44f8-a2fa1650c6ba
#   Workspace : 27818fad-0450-42b9-a4a0-db84075ac8d7
#
# NOTE: model_customer.Notebook uses different GUIDs (lakehouse 7bc5f01b,
#       workspace 2948455a) that are NOT parameterized here.
# ============================================================================

find_replace:

  # ==========================================================================
  # NOTEBOOK — Lakehouse ID Replacement
  # ==========================================================================

  # Lakehouse GUID used in main_pipeline.Notebook/notebook-content.py
  # (default_lakehouse and lakehouse id fields)
  - find_value: "3da39fae-d464-ba66-44f8-a2fa1650c6ba"
    replace_value:
      _ALL_: "$items.Lakehouse.fabriciq_team_lake.$id"
    item_type: "Notebook"

  # ==========================================================================
  # DATA AGENT — Lakehouse Reference Replacement
  # ==========================================================================

  # The Data Agent datasource.json stores the fabriciq_team_lake lakehouse reference
  # as artifactId. This must resolve to the deployed lakehouse item ID.
  - find_value: "3da39fae-d464-ba66-44f8-a2fa1650c6ba"
    replace_value:
      _ALL_: "$items.Lakehouse.fabriciq_team_lake.$id"
    item_type: "DataAgent"